<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OBESynK | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#047857",
              "primary-container": "#d1fae5",
              "on-primary": "#ffffff",
              "secondary": "#059669",
              "secondary-container": "#a7f3d0",
              "surface": "#f8fafc",
              "on-surface": "#0f172a",
              "on-surface-variant": "#475569",
              "outline": "#cbd5e1",
              "outline-variant": "#e2e8f0"
            },
            fontFamily: {
              "sans": ["Inter", "sans-serif"]
            }
          }
        }
      }
</script>
<style>
    body { font-family: "Inter", sans-serif; }
    .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; 
    }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div class="text-center">
      <h1 class="text-4xl font-bold tracking-tight text-primary">OBESynK</h1>
      <p class="mt-2 text-sm text-on-surface-variant font-medium">Academic Portal</p>
    </div>
    <div class="bg-white py-10 px-8 shadow rounded-lg border border-outline-variant">
      <h2 class="text-center text-2xl font-bold text-on-surface mb-8">Login</h2>
      <form class="space-y-6" action="#" method="POST">
        <div>
          <label for="identity" class="block text-sm font-semibold text-on-surface-variant">Email or Roll Number</label>
          <div class="mt-1">
            <input id="identity" name="identity" type="text" autocomplete="email" required class="appearance-none block w-full px-4 py-3 border border-outline rounded-md shadow-sm placeholder-outline-variant focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors text-on-surface">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-on-surface-variant">Password</label>
          <div class="mt-1">
            <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none block w-full px-4 py-3 border border-outline rounded-md shadow-sm placeholder-outline-variant focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors text-on-surface">
          </div>
          <div class="flex items-center justify-end mt-2">
            <div class="text-sm">
              <a href="#" class="font-medium text-primary hover:text-[#065f46] transition-colors">
                Forgot password?
              </a>
            </div>
          </div>
        </div>

        <div>
          <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-primary hover:bg-[#065f46] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors mt-4">
            Login
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
